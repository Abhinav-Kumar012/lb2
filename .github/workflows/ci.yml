name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest
      
      - name: Install mdbook-mermaid
        run: |
          curl -L \
            https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz
          sudo mv mdbook-mermaid /usr/local/bin/
          mdbook-mermaid --version
          mdbook-mermaid install .

      - name: Build book
        run: mdbook build

      - name: Stats
        run: |
          echo "Pages: $(find src -name '*.md' -not -name 'SUMMARY.md' -size +1k | wc -l)"
          echo "Lines: $(find src -name '*.md' -not -name 'SUMMARY.md' -size +1k -exec cat {} + | wc -l)"
